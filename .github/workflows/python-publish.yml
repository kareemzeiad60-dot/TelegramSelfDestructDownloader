name: Run Bot

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore session
        env:
          TG_SESSION_B64: ${{ secrets.TG_SESSION_B64 }}
          TG_PHONE: ${{ secrets.TG_PHONE }}
        run: |
          if [ -n "$TG_SESSION_B64" ] && [ -n "$TG_PHONE" ]; then
            SAFE_PHONE=$(echo "$TG_PHONE" | tr -d '+- ')
            echo "$TG_SESSION_B64" | base64 -d > "session_${SAFE_PHONE}.session"
            echo "Session restored."
          fi

      - name: Run bot
        env:
          TG_API_ID:    ${{ secrets.TG_API_ID }}
          TG_API_HASH:  ${{ secrets.TG_API_HASH }}
          TG_PHONE:     ${{ secrets.TG_PHONE }}
          TG_SESSION_B64: ${{ secrets.TG_SESSION_B64 }}
        run: python main.py
