name: Telegram Downloader Bot 2 Hours Loop

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # تتيح لك تشغيله يدوياً في أي وقت
  schedule:
    - cron: '0 */2 * * *' # تشغيل احتياطي من جيت هاب كل ساعتين لو توقفت الحلقة لأي سبب
  repository_dispatch:
    types: [restart-bot] # الحدث الذي سيطلقه السكربت لإعادة تشغيل نفسه

# إعطاء صلاحيات للـ Workflow لكي يستطيع إطلاق جوب جديدة تلقائياً
permissions:
  contents: write
  actions: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install telethon; fi

    - name: Run Telegram Script with 2-Hour Timeout
      env:
        TG_API_ID: ${{ secrets.TG_API_ID }}
        TG_API_HASH: ${{ secrets.TG_API_HASH }}
        TG_PHONE: ${{ secrets.TG_PHONE }}
        TG_SESSION_B64: ${{ secrets.TG_SESSION_B64 }}
        TG_MAX_FILE_SIZE_MB: ${{ secrets.TG_MAX_FILE_SIZE_MB }}
        TG_INCLUDE_CHAT_TITLE: ${{ secrets.TG_INCLUDE_CHAT_TITLE }}
        TG_FORWARD_TO_SAVED: ${{ secrets.TG_FORWARD_TO_SAVED }}
      run: |
        # تشغيل السكربت لمدة ساعتين تماماً (7200 ثانية) ثم إغلاقه بأمان
        timeout 7200 python main.py || true

    - name: Trigger Next Run Automatically
      if: always() # يضمن تنفيذ هذا السطر حتى لو توقف السكربت بسبب خطأ
      uses: peter-evans/repository-dispatch@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        event-type: restart-bot
