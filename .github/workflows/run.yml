name: Telegram Downloader Bot 24/7

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # للتشغيل اليدوي
  schedule:
    # سيقوم جيت هاب بتشغيل السكربت تلقائياً كل 3 ساعات لضمان عدم توقفه لفترة طويلة
    - cron: '0 */3 * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    # نحدد وقت أقصى لتشغيل الجوب الواحدة (مثلاً 5 ساعات ونصف) لتجنب الإغلاق المفاجئ من جيت هاب
    timeout-minutes: 330 

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install telethon; fi

    - name: Run Telegram Script
      env:
        TG_API_ID: ${{ secrets.TG_API_ID }}
        TG_API_HASH: ${{ secrets.TG_API_HASH }}
        TG_PHONE: ${{ secrets.TG_PHONE }}
        TG_SESSION_B64: ${{ secrets.TG_SESSION_B64 }}
        TG_MAX_FILE_SIZE_MB: ${{ secrets.TG_MAX_FILE_SIZE_MB }}
        TG_INCLUDE_CHAT_TITLE: ${{ secrets.TG_INCLUDE_CHAT_TITLE }}
        TG_FORWARD_TO_SAVED: ${{ secrets.TG_FORWARD_TO_SAVED }}
      run: |
        python main.py
